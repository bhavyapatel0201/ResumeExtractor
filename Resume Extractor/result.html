<!doctype html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Results - Resume Extractor</title>
<link rel='stylesheet' href='styles.css?v=__BUILD__'>
<style>
  #vettingReportBtn {
    background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 25%, #3b82f6 50%, #60a5fa 75%, #93c5fd 100%);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    position: relative;
    overflow: hidden;
  }
  
  #vettingReportBtn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s ease;
  }
  
  #vettingReportBtn:hover {
    background: linear-gradient(135deg, #1e40af 0%, #2563eb 25%, #3b82f6 50%, #60a5fa 75%, #93c5fd 100%);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
    border-color: rgba(255,255,255,0.5);
  }
  
  #vettingReportBtn:hover::before {
    left: 100%;
  }
  
  #vettingReportBtn:active {
    transform: translateY(0);
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
  }
  
  /* Update result page right side to match vetting report left side formatting */
  .panel:last-child .markdown {
    color: #ffffff;
    line-height: 1.6;
  }
  
  .panel:last-child .markdown h1, 
  .panel:last-child .markdown h2, 
  .panel:last-child .markdown h3 {
    color: #3b82f6;
    margin-top: 20px;
    margin-bottom: 10px;
    font-weight: 800;
  }
  
  .panel:last-child .markdown h1 {
    font-size: 1.4rem;
    color: #3b82f6;
    margin-top: 20px;
    margin-bottom: 10px;
    font-weight: 800;
  }
  
  /* Special styling for Skills heading - blue color, bold, same size as certifications */
  .panel:last-child .markdown h1.skills-heading {
    color: #3b82f6;
    font-weight: 800;
    font-size: 1.4rem;
  }
  
  /* Ensure Skills heading is blue like other main headings */
  .panel:last-child .markdown h1.skills-heading {
    color: #3b82f6 !important;
  }
  
  /* Make Certifications heading blue bold */
  .panel:last-child .markdown h1.certifications-heading {
    color: #3b82f6 !important;
    font-weight: 800;
    font-size: 1.4rem;
  }
  
  /* Make Summary text appear as a heading with same size as Certifications */
  .panel:last-child .markdown .summary-heading {
    font-size: 1.4rem;
    color: #3b82f6;
    font-weight: 800;
    display: block;
    margin-top: 20px;
    margin-bottom: 10px;
  }
  
  .panel:last-child .markdown h2 {
    font-size: 1.4rem;
  }
  
  .panel:last-child .markdown h3 {
    font-size: 1.2rem;
  }
  
  .panel:last-child .markdown p {
    margin: 8px 0;
    color: #ffffff;
    line-height: 1.35;
  }
  
  .panel:last-child .markdown strong {
    color: #fbbf24;
    font-weight: 600;
    font-size: 1.1em;
  }
  
  .panel:last-child .markdown ul, 
  .panel:last-child .markdown ol {
    margin: 10px 0;
    padding-left: 0;
    list-style: none;
  }
  
  .panel:last-child .markdown li {
    margin: 4px 0;
    color: #ffffff;
    line-height: 1.3;
  }
</style>
</head>
<body>
<main class='result-container'>
  <header class='result-header'>
    <h1>Extraction Results</h1>
    <a href='index.html' class='btn ghost'>← Back</a>
  </header>
  <section class='result-grid'>
    <div class='panel'>
      <h2>Input Data</h2>
      <div id='extracted' class='markdown markdown--input'></div>
    </div>
    <div class='panel'>
      <div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:12px;flex-wrap:wrap;padding-bottom:20px;border-bottom:2px solid #fbbf24'>
        <div style='display:flex;gap:8px;align-items:flex-start;flex-direction:column;flex:1;min-width:250px'>
          <label for='jobDescriptionInput' style='color:#fbbf24;font-weight:700;font-size:0.95rem'>📋 Enter the Job Description to be compared</label>
          <textarea id='jobDescriptionInput' style='width:100%;height:120px;padding:10px;border:2px solid #fbbf24;border-radius:6px;background:#1f2937;color:#fff;font-family:monospace;font-size:0.85rem;resize:vertical'></textarea>
        </div>
        <div style='display:flex;gap:8px;align-items:flex-end;flex-direction:column'>
          <button id='vettingReportBtn' class='btn warning' onclick='if(window.handleVettingReportClick) window.handleVettingReportClick(event); else alert("Script not loaded yet. Please try again.");'>Cover page</button>
        </div>
      </div>
      <div style='margin-top:20px;padding-top:20px;border-top:2px solid #3b82f6'>
        <div id='jobDescriptionDisplay' style='display:none;margin-bottom:20px;padding:15px;background:#1f2937;border-left:4px solid #fbbf24;border-radius:4px'>
          <h3 style='color:#fbbf24;font-weight:700;margin:0 0 10px 0;font-size:1rem'>📋 Job Description</h3>
          <p id='jobDescriptionText' style='color:#e5e7eb;margin:0;white-space:pre-wrap;word-wrap:break-word;font-family:monospace;font-size:0.85rem;line-height:1.6'></p>
        </div>
        <h3 style='color:#3b82f6;font-weight:700;margin-bottom:16px;font-size:1.1rem'>📄 Resume Output</h3>
        <div id='markdown' class='markdown'></div>
      </div>
      <div style='display:flex;justify-content:flex-end;align-items:center;margin-top:20px;gap:8px;border-top:1px solid #444;padding-top:16px'>
        <button id='editBtn' class='btn info'>Edit</button>
        <button id='downloadDocxTemplateAll' class='btn success'>Download OUTPUT</button>
      </div>
    </div>
  </section>
</main>
<div id='effectsLayer' aria-hidden='true'></div>

<!-- Simple Animated Popup Alert -->
<div id='jobDescriptionAlert' style='position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);background:linear-gradient(135deg, #ff6b6b 0%, #ff4444 100%);padding:50px;border-radius:20px;box-shadow:0 30px 80px rgba(255, 107, 107, 0.6);z-index:10000;min-width:400px;text-align:center;display:none;pointer-events:all'>
  <h1 style='color:#fff;margin:0 0 20px 0;font-size:2rem;font-weight:900'>⚠️</h1>
  <h2 style='color:#fff;margin:0 0 15px 0;font-size:1.8rem;font-weight:bold'>Fill the Text Box!</h2>
  <p style='color:#fff;margin:0 0 30px 0;font-size:1.1rem;line-height:1.6'>Job Description cannot be empty.<br>Please enter the job description to continue.</p>
  <button id='jobDescriptionAlertClose' style='padding:15px 40px;background:#fff;color:#ff4444;border:none;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.3s;box-shadow:0 5px 20px rgba(0,0,0,0.2)'>Understood! Let Me Fill It</button>
</div>

<style>
  @keyframes popupZoom {
    0% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
    }
    50% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.1);
    }
    100% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  }
  
  @keyframes popupShake {
    0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    25% { transform: translate(-50%, -50%) scale(1.02) rotate(-1deg); }
    50% { transform: translate(-50%, -50%) scale(1.02) rotate(1deg); }
    75% { transform: translate(-50%, -50%) scale(1.02) rotate(-1deg); }
  }
  
  #jobDescriptionAlert.show {
    display: block !important;
    animation: popupZoom 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) !important;
  }
  
  #jobDescriptionAlert.shake {
    animation: popupShake 0.5s !important;
  }
  
  #jobDescriptionAlertClose:hover {
    background-color: #f0f0f0;
    transform: scale(1.05);
  }
  
  #jobDescriptionAlertClose:active {
    transform: scale(0.95);
  }
</style>

<style>
  @keyframes slideIn {
    from {
      opacity: 0;
      transform: scale(0.9) translateY(-50px);
    }
    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }
  
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }
  
  @keyframes pulse {
    0%, 100% { 
      opacity: 1;
      transform: scale(1);
    }
    50% { 
      opacity: 0.8;
      transform: scale(1.05);
    }
  }
  
  #customAlertModal {
    display: none !important;
  }
  
  #customAlertModal.show {
    display: flex !important;
  }
  
  #customAlertModal.shake {
    animation: shake 0.5s;
  }
  
  #alertOkBtn:hover {
    background-color: #f0f0f0 !important;
    transform: translateY(-2px);
  }
</style>

<script src='https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js'></script>
<!-- DOCX to HTML/Text -->
<script src='https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js'></script>
<!-- PDF.js core -->
<script src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js'></script>
<script src='result.js?v=__BUILD__'></script>

  // Ensure handleVettingReportClick is available globally
  console.log('Scripts loaded. handleVettingReportClick available:', typeof window.handleVettingReportClick);
</script>
</body>
</html>
